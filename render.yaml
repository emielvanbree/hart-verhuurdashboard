services:
  - type: web
    name: hart-verhuurdashboard
    runtime: node
    buildCommand: npm install --ignore-scripts
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
