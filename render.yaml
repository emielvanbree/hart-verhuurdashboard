services:
  - type: web
    name: hart-verhuurdashboard
    runtime: node
    buildCommand: npm install --ignore-scripts && cd client && npm install && npm run build && cd ..
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 3000
